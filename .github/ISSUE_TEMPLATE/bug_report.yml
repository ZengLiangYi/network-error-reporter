name: Bug report
description: Report a defect in the extension
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps.
      placeholder: |
        1. Open page
        2. Open DevTools
        3. Switch to Error Report
        4. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: chrome_version
    attributes:
      label: Chrome version
      placeholder: "e.g. 145.0.0.0"
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Include screenshots or logs if needed.
